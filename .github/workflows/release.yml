name: Auto Compile NN6000V2

# 触发条件：当向 main 或 master 分支 push/PR 时触发
on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # 使用 GitHub 提供的最新 Ubuntu 环境
    runs-on: ubuntu-latest

    steps:
    # 第一步：拉取仓库代码
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive  # 如果项目依赖了子模块，自动拉取

    # 第二步：安装编译依赖（根据你的项目需求取消注释或修改）
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc g++ make cmake git
        # 如果是 ARM/MIPS 嵌入式项目，通常需要交叉编译器，例如：
        # sudo apt-get install -y gcc-arm-none-eabi
        # sudo apt-get install -y gcc-mips-linux-gnu

    # 第三步：执行编译脚本或命令
    - name: Run Build Command
      run: |
        # 【请根据仓库实际情况，在下方三者中选一个，删掉不需要的】
        
        # 情况 A：如果根目录下有 build.sh 或 make.sh
        if [ -f "./build.sh" ]; then
          chmod +x ./build.sh
          ./build.sh
        
        # 情况 B：如果根目录下直接是 Makefile
        elif [ -f "./Makefile" ] || [ -f "./makefile" ]; then
          make
          
        # 情况 C：如果是 CMake 项目
        elif [ -f "./CMakeLists.txt" ]; then
          mkdir build && cd build
          cmake ..
          make
        else
          echo "未找到标准的编译文件，请手动在此处填写编译命令"
          exit 1
        fi

    # 第四步：自动将编译好的固件/二进制文件打包上传，供你下载
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NN6000V2-Build-Output
        # 这里的路径需要指向你编译出来的 bin、hex 或 ELF 文件实际生成的目录
        # 例如整个 output 文件夹，或者当前目录下的所有 .bin 文件
        path: |
          ./*.bin
          ./*.hex
          ./build/
          ./output/
